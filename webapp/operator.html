<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Gulnora Farm — Operator</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #fff);
    --sec: var(--tg-theme-secondary-bg-color, #f3f4f6);
    --text: var(--tg-theme-text-color, #16181c);
    --hint: var(--tg-theme-hint-color, #8a929c);
    --link: var(--tg-theme-link-color, #3390ec);
    --accent: var(--tg-theme-button-color, #3390ec);
    --accent-text: var(--tg-theme-button-text-color, #fff);
    --sep: rgba(128,128,128,.18);
    --in: var(--tg-theme-bg-color, #fff);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:-apple-system,"Segoe UI",Roboto,sans-serif}
  html,body{margin:0;height:100%;background:var(--sec);color:var(--text);font-size:15px}
  .hide{display:none!important}
  button{font-family:inherit}
  .ic{width:24px;height:24px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:block}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--sec)}

  /* ---- Login ---- */
  #login{justify-content:center;align-items:center;padding:26px;gap:14px;background:var(--bg)}
  #login .logo{width:64px;height:64px;border-radius:18px;background:var(--accent);color:var(--accent-text);
    display:flex;align-items:center;justify-content:center;margin-bottom:6px}
  #login h2{margin:0;font-size:20px}
  #login p{margin:0 0 10px;color:var(--hint);font-size:14px}
  .field{width:100%;max-width:340px}
  .field input{width:100%;padding:14px;border:1px solid var(--sep);border-radius:12px;
    background:var(--sec);color:var(--text);font-size:16px;outline:none}
  .field input:focus{border-color:var(--accent)}
  .btn{background:var(--accent);color:var(--accent-text);border:none;padding:14px;border-radius:12px;
    font-size:16px;font-weight:600;cursor:pointer;width:100%;max-width:340px}
  .err{color:#e5484d;font-size:14px;min-height:18px;text-align:center}

  /* ---- App shell ---- */
  #app{background:var(--sec)}
  .body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
  .tabbar{display:flex;background:var(--bg);border-top:1px solid var(--sep)}
  .tabbar button{flex:1;background:none;border:none;color:var(--hint);padding:8px 0 10px;
    display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;cursor:pointer}
  .tabbar button.on{color:var(--accent)}
  .tabbar .dot{position:absolute;top:4px;margin-left:16px;min-width:16px;height:16px;background:#e5484d;
    border-radius:9px;color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;padding:0 4px}

  .topbar{display:flex;align-items:center;gap:8px;padding:12px 14px;background:var(--bg);border-bottom:1px solid var(--sep)}
  .topbar .t{font-weight:600;font-size:17px;flex:1}
  .iconbtn{background:none;border:none;color:var(--link);cursor:pointer;padding:6px;display:flex;align-items:center}

  /* ---- Chat list ---- */
  .row{display:flex;gap:12px;padding:10px 14px;cursor:pointer;align-items:center;background:var(--bg)}
  .row:active{background:var(--sec)}
  .row+.row{border-top:1px solid var(--sep)}
  .ava{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#5eb5f7,#3390ec);
    color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:20px;
    flex-shrink:0;background-size:cover;background-position:center}
  .row .mid{flex:1;min-width:0}
  .row .nm{font-weight:600;display:flex;justify-content:space-between;gap:8px;align-items:center}
  .row .nm .tm{font-size:12px;color:var(--hint);font-weight:400;flex-shrink:0}
  .row .pv{color:var(--hint);font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
  .newdot{width:9px;height:9px;border-radius:50%;background:var(--accent);flex-shrink:0}
  .tag{background:var(--accent);color:#fff;font-size:11px;padding:1px 7px;border-radius:9px}
  .empty{padding:60px 24px;text-align:center;color:var(--hint)}

  /* ---- Chat view ---- */
  #chat{background:var(--sec)}
  .msgs{flex:1;overflow-y:auto;padding:12px 10px;display:flex;flex-direction:column;gap:3px}
  .b{max-width:80%;padding:7px 11px;border-radius:16px;font-size:15px;line-height:1.35;word-wrap:break-word;
    white-space:pre-wrap;position:relative}
  .b.c{align-self:flex-start;background:var(--bg);border-bottom-left-radius:5px}
  .b.o{align-self:flex-end;background:var(--accent);color:var(--accent-text);border-bottom-right-radius:5px}
  .b .tm{font-size:10px;opacity:.6;margin-top:2px;text-align:right}
  .b img{max-width:230px;border-radius:12px;display:block;margin:-2px 0 2px}
  .b audio{width:230px;margin:2px 0}
  .composer{display:flex;gap:6px;padding:7px 8px;background:var(--bg);border-top:1px solid var(--sep);align-items:flex-end}
  .composer textarea{flex:1;resize:none;border:none;border-radius:20px;padding:10px 14px;font-size:15px;
    background:var(--sec);color:var(--text);max-height:110px;outline:none}
  .cbtn{width:42px;height:42px;border-radius:50%;border:none;background:none;color:var(--link);
    display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .cbtn.acc{background:var(--accent);color:var(--accent-text)}
  .cbtn.rec{background:#e5484d;color:#fff;animation:pulse 1s infinite}
  @keyframes pulse{50%{opacity:.6}}

  /* ---- Profile ---- */
  .prof{padding:22px 16px;text-align:center;background:var(--bg);border-bottom:1px solid var(--sep)}
  .prof .ava{width:96px;height:96px;font-size:38px;margin:0 auto 10px;position:relative}
  .prof .cam{position:absolute;right:0;bottom:0;width:30px;height:30px;border-radius:50%;background:var(--accent);
    color:#fff;display:flex;align-items:center;justify-content:center;border:2px solid var(--bg)}
  .prof h3{margin:4px 0 2px;font-size:20px}
  .prof .sub{color:var(--hint);font-size:14px}
  .cards{display:flex;gap:8px;padding:14px 16px}
  .card{flex:1;background:var(--bg);border-radius:12px;padding:12px 8px;text-align:center}
  .card b{font-size:20px;display:block}
  .card span{color:var(--hint);font-size:12px}
  .list{margin:8px 0}
  .item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--bg);cursor:pointer}
  .item+.item{border-top:1px solid var(--sep)}
  .item .lbl{flex:1}
  .item .val{color:var(--hint);font-size:14px}
  .item.danger{color:#e5484d}
  .switch{width:44px;height:26px;border-radius:14px;background:var(--sep);position:relative;transition:.2s;flex-shrink:0}
  .switch.on{background:#31c48d}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s}
  .switch.on::after{left:21px}
  .seg{display:flex;gap:6px;background:var(--sec);border-radius:10px;padding:3px}
  .seg button{flex:1;border:none;background:none;color:var(--text);padding:7px;border-radius:8px;font-size:13px;cursor:pointer}
  .seg button.on{background:var(--accent);color:var(--accent-text)}

  /* ---- Manual light/dark (auto = Telegram temasi) ---- */
  html[data-theme="light"]{--bg:#ffffff;--sec:#f1f2f5;--text:#0f1419;--hint:#8a929c;--link:#3390ec;
    --accent:#3390ec;--accent-text:#fff;--sep:rgba(0,0,0,.08)}
  html[data-theme="dark"]{--bg:#17212b;--sec:#0e1621;--text:#f5f5f5;--hint:#7d8b99;--link:#6ab3f3;
    --accent:#3390ec;--accent-text:#fff;--sep:rgba(255,255,255,.09)}
  html[data-theme="dark"] .card,html[data-theme="dark"] .row,html[data-theme="dark"] .item,
  html[data-theme="dark"] .topbar,html[data-theme="dark"] .prof,html[data-theme="dark"] .b.c,
  html[data-theme="dark"] .tabbar,html[data-theme="dark"] #cmdpanel{background:#17212b}
  html[data-theme="dark"] body,html[data-theme="dark"] .screen,html[data-theme="dark"] .msgs{background:#0e1621}
  html[data-theme="dark"] .composer{background:#17212b}

  /* ---- Voice player (Telegram uslubi) ---- */
  .vp{display:flex;align-items:center;gap:9px;min-width:180px}
  .vp .pp{width:38px;height:38px;border-radius:50%;background:var(--accent);color:var(--accent-text);
    border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
  .b.o .vp .pp{background:#fff;color:var(--accent)}
  .vp canvas{flex:1;height:26px;cursor:pointer}
  .vp .vt{font-size:11px;opacity:.7;min-width:30px}

  /* ---- Recording bar ---- */
  #recbar{align-items:center;gap:8px}
  .recdot{width:11px;height:11px;border-radius:50%;background:#e5484d;animation:pulse 1s infinite;flex-shrink:0}
  .rectime{font-variant-numeric:tabular-nums;font-size:14px;min-width:38px}
  #recwave{flex:1;height:30px}

  /* ---- CRM kanali ---- */
  .chanpin{border-bottom:1px solid var(--sep)!important}
  .chanpin .ava{background:linear-gradient(135deg,#54a9eb,#3390ec)}
  .ccard{background:var(--bg);border-radius:14px;padding:12px 14px;margin-bottom:10px}
  .ccard .ch{display:flex;gap:10px;align-items:center;margin-bottom:6px}
  .ccard .ch .mid{flex:1;min-width:0}
  .ccard .nm{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .ccard .sub{color:var(--hint);font-size:12px}
  .ccard .txt{font-size:14.5px;margin:4px 0;line-height:1.4;white-space:pre-wrap;word-wrap:break-word}
  .ccard img{max-width:100%;border-radius:10px;margin:4px 0;display:block}
  .ccard .accept{width:100%;background:var(--accent);color:var(--accent-text);border:none;
    padding:11px;border-radius:10px;font-weight:600;font-size:15px;cursor:pointer;margin-top:6px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen">
  <div class="logo"><svg class="ic" viewBox="0 0 24 24" style="width:30px;height:30px"><path d="M8 10h8M8 14h5M21 12a9 9 0 1 1-3.5-7.1L21 4l-1 4.5"/></svg></div>
  <h2>Operator paneli</h2>
  <p>Gulnora Farm CRM</p>
  <div class="field"><input id="in-login" placeholder="Login" autocomplete="username"></div>
  <div class="field"><input id="in-pass" type="password" placeholder="Parol" autocomplete="current-password"></div>
  <div id="login-err" class="err"></div>
  <button id="btn-login" class="btn">Kirish</button>
</div>

<!-- APP -->
<div id="app" class="screen hide">
  <!-- CHATS TAB -->
  <div id="tab-chats" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div class="topbar"><div class="t">Chatlar</div>
      <button class="iconbtn" onclick="loadChats()"><svg class="ic" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 4v5h-5"/></svg></button>
    </div>
    <div class="body" style="flex:1">
      <div class="row chanpin" onclick="openChannel()">
        <div class="ava"><svg class="ic" viewBox="0 0 24 24" style="stroke:#fff"><path d="M3 11l18-5v13L3 14v-3zM11.6 16.8a3 3 0 0 1-5.8-1.6"/></svg></div>
        <div class="mid">
          <div class="nm"><span>Gulnora Farm — Murojaatlar</span>
            <svg class="ic" viewBox="0 0 24 24" style="width:15px;height:15px;color:var(--hint)"><path d="M12 17v5M8 2h8M9 2l1 9M15 2l-1 9M6 11h12l-2 4H8l-2-4z"/></svg></div>
          <div class="pv" id="chan-sub">Yangi murojaatlar shu yerda</div>
        </div>
        <div id="chan-badge" class="tag hide">0</div>
      </div>
      <div id="rows"></div>
    </div>
  </div>
  <!-- CLIENTS TAB -->
  <div id="tab-clients" class="hide" style="flex:1;display:flex;flex-direction:column;overflow:hidden">
    <div class="topbar"><div class="t">Mijozlarim</div></div>
    <div style="padding:8px 12px;background:var(--bg);border-bottom:1px solid var(--sep)">
      <input id="cl-search" placeholder="Qidiruv (ism yoki telefon)" oninput="loadClients()"
        style="width:100%;padding:10px 12px;border:none;border-radius:10px;background:var(--sec);color:var(--text);outline:none;font-size:15px">
    </div>
    <div id="clrows" class="body"></div>
  </div>
  <!-- PROFILE TAB -->
  <div id="tab-prof" class="body hide">
    <div class="prof">
      <div class="ava" id="p-ava" onclick="pickAvatar()"><span id="p-init">?</span>
        <div class="cam"><svg class="ic" viewBox="0 0 24 24" style="width:16px;height:16px"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></div>
      </div>
      <h3 id="p-name">—</h3>
      <div class="sub" id="p-login"></div>
    </div>
    <div class="cards">
      <div class="card"><b id="p-acc">0</b><span>Qabul</span></div>
      <div class="card"><b id="p-done">0</b><span>Yakun</span></div>
      <div class="card"><b id="p-today">0</b><span>Bugun</span></div>
      <div class="card"><b id="p-rate">0</b><span>Baho</span></div>
    </div>
    <div class="list">
      <div class="item"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l2 2"/></svg>
        <div class="lbl">Holatim</div>
        <div class="val" id="p-stlbl">Bo'sh</div>
        <div class="switch on" id="p-switch" onclick="toggleStatus()"></div>
      </div>
    </div>
    <div class="list">
      <div class="item" style="display:block">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:9px">
          <svg class="ic" viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
          <div class="lbl">Mavzu</div>
        </div>
        <div class="seg" id="themeseg">
          <button data-th="auto" onclick="setTheme('auto')">Avto</button>
          <button data-th="light" onclick="setTheme('light')">Yorug'</button>
          <button data-th="dark" onclick="setTheme('dark')">Tungi</button>
        </div>
      </div>
    </div>
    <div class="list">
      <div class="item danger" onclick="logout()"><svg class="ic" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg><div class="lbl">Chiqish</div></div>
    </div>
  </div>
  <!-- TAB BAR -->
  <div class="tabbar">
    <button id="tb-chats" class="on" onclick="showTab('chats')" style="position:relative">
      <svg class="ic" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-9 8.5 8.5 8.5 0 0 1-3.8-.9L3 20l1.9-5.2A8.5 8.5 0 0 1 12 3a8.38 8.38 0 0 1 9 8.5z"/></svg>
      Chatlar<span id="tb-badge" class="dot hide">0</span>
    </button>
    <button id="tb-clients" onclick="showTab('clients')">
      <svg class="ic" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      Mijozlarim
    </button>
    <button id="tb-prof" onclick="showTab('prof')">
      <svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>
      Profil
    </button>
  </div>
</div>

<!-- CHAT VIEW -->
<div id="chat" class="screen hide">
  <div class="topbar">
    <button class="iconbtn" onclick="backToList()"><svg class="ic" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="ava" id="c-ava" style="width:38px;height:38px;font-size:16px"></div>
    <div style="flex:1;min-width:0"><div class="t" id="c-name" style="font-size:16px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">—</div>
      <div class="val" id="c-phone" style="color:var(--hint);font-size:12px"></div></div>
    <button class="iconbtn" onclick="closeChat()" title="Yakunlash"><svg class="ic" viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg></button>
    <button class="iconbtn" onclick="hideChat()" title="O'chirish"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>
  </div>
  <div id="msgs" class="msgs"></div>
  <div id="cmdpanel" class="hide" style="background:var(--bg);border-top:1px solid var(--sep);max-height:220px;overflow-y:auto"></div>
  <div id="composer" class="composer">
    <button class="cbtn" onclick="pickPhoto()"><svg class="ic" viewBox="0 0 24 24"><path d="M21 15l-5-5L5 21"/><path d="M21 19V5a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2z"/><circle cx="8.5" cy="8.5" r="1.5"/></svg></button>
    <textarea id="in-msg" rows="1" placeholder="Xabar..."></textarea>
    <button class="cbtn" id="mic" onclick="startRec()"><svg class="ic" viewBox="0 0 24 24"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10a7 7 0 0 1-14 0M12 19v4"/></svg></button>
    <button class="cbtn acc" id="sendbtn" onclick="send()" style="display:none"><svg class="ic" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
  </div>
  <div id="recbar" class="composer hide">
    <button class="cbtn" style="color:#e5484d" onclick="cancelRec()"><svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button>
    <div class="recdot"></div>
    <div id="rectime" class="rectime">0:00</div>
    <canvas id="recwave"></canvas>
    <button class="cbtn acc" onclick="stopSendRec()"><svg class="ic" viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
  </div>
</div>
<input type="file" id="file-photo" accept="image/*" class="hide">
<input type="file" id="file-ava" accept="image/*" class="hide">

<!-- CRM KANALI -->
<div id="channel" class="screen hide">
  <div class="topbar">
    <button class="iconbtn" onclick="closeChannel()"><svg class="ic" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
    <div class="ava" style="width:38px;height:38px;background:linear-gradient(135deg,#54a9eb,#3390ec)"><svg class="ic" viewBox="0 0 24 24" style="stroke:#fff;width:20px;height:20px"><path d="M3 11l18-5v13L3 14v-3zM11.6 16.8a3 3 0 0 1-5.8-1.6"/></svg></div>
    <div style="flex:1;min-width:0"><div class="t" style="font-size:16px">Gulnora Farm — Murojaatlar</div>
      <div class="val" style="color:var(--hint);font-size:12px" id="chan-count">0 ta yangi</div></div>
    <button class="iconbtn" onclick="loadChannel()"><svg class="ic" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-2.6-6.4M21 4v5h-5"/></svg></button>
  </div>
  <div id="chanfeed" class="body" style="padding:10px"></div>
</div>

<!-- Filial tanlash modal -->
<div id="branchmodal" class="screen hide" style="background:rgba(0,0,0,.45);justify-content:flex-end">
  <div style="background:var(--bg);border-radius:16px 16px 0 0;max-height:72%;overflow-y:auto">
    <div class="topbar"><div class="t">Filialni tanlang</div>
      <button class="iconbtn" onclick="closeBranch()"><svg class="ic" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>
    <div id="branchrows"></div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp; tg.ready(); tg.expand();
try{ tg.setHeaderColor && tg.setHeaderColor('secondary_bg_color'); }catch(e){}
const INIT = tg.initData || "";
let OP = { id: localStorage.getItem("op_id"), name: localStorage.getItem("op_name"), token: localStorage.getItem("op_token") };
let CUR = null, pollTimer = null, rec = null, recChunks = [];

function q(path, method, body){
  const b = Object.assign({ _init: INIT }, body || {});
  const o = { method, headers: { "X-Init-Data": INIT, "Content-Type": "application/json" } };
  if(method === "GET"){ return fetch(path + "?" + new URLSearchParams(b), o).then(r => r.json()); }
  o.body = JSON.stringify(b); return fetch(path, o).then(r => r.json());
}
function fileUrl(fid, kind){
  return "/api/file?" + new URLSearchParams({ fid, kind, operator_id: OP.id, token: OP.token, _init: INIT });
}
function esc(s){ return (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function ini(n){ return (n||"?").trim().charAt(0).toUpperCase(); }
function auth(){ return { operator_id: OP.id, token: OP.token }; }

// ---- Login ----
document.getElementById("btn-login").onclick = async () => {
  const login = document.getElementById("in-login").value.trim();
  const password = document.getElementById("in-pass").value.trim();
  const err = document.getElementById("login-err"); err.textContent = "";
  if(!login || !password){ err.textContent = "Login va parolni kiriting"; return; }
  const r = await q("/api/login", "POST", { login, password });

const _MLBL={video:"Video",document:"Hujjat",sticker:"Stiker",animation:"GIF",location:"Lokatsiya"};

async function loadMsgs(scroll){
  const r = await q("/api/messages", "GET", Object.assign(auth(), { order_id: CUR }));
  if(!r.ok) return;
  document.getElementById("c-phone").textContent = r.client.phone || "";

  const sig = r.messages.length + "|" + (last.time||"") + "|" + (last.file_id||"") + "|" + (last.text||"");

    if(m.type === "photo" && m.file_id){ inner = `<img src="${fileUrl(m.file_id,'photo')}">` + (m.text?esc(m.text):""); }
    else if((m.type === "voice" || m.type === "audio") && m.file_id){

    else if(m.type === "video" && m.file_id){ inner = `<video controls style="max-width:230px;border-radius:12px" src="${fileUrl(m.file_id,'video')}"></video>`; }
    else if(m.type !== "text" && m.type){ inner = (_MLBL[m.type]||"Fayl") + (m.text?": "+esc(m.text):""); }

  }).join("");

function compressImage(file, maxDim, quality){
  return new Promise(res=>{
    const rd=new FileReader();
    rd.onload=()=>{ const img=new Image();
      img.onload=()=>{ let w=img.width, h=img.height;
        if(w>maxDim||h>maxDim){ if(w>=h){ h=Math.round(h*maxDim/w); w=maxDim; } else { w=Math.round(w*maxDim/h); h=maxDim; } }
        const c=document.createElement("canvas"); c.width=w; c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        try{ res(c.toDataURL("image/jpeg",quality)); }catch(e){ res(rd.result); } };
      img.onerror=()=>res(rd.result); img.src=rd.result; };
    rd.readAsDataURL(file);
  });
}

};
// ---- Voice yozish (Telegram uslubi: taymer + jonli to'lqin) ----
let audioCtx=null, analyser=null, recStream=null, recAnim=null, recStart=0, recBars=[];
function getAccent(){ return (getComputedStyle(document.documentElement).getPropertyValue('--accent')||'#3390ec').trim(); }
async function startRec(){
  if(!navigator.mediaDevices){ tg.showAlert("Mikrofon mavjud emas"); return; }
  try{ recStream = await navigator.mediaDevices.getUserMedia({audio:true}); }
  catch(e){ tg.showAlert("Mikrofonga ruxsat berilmadi"); return; }
  recChunks=[];
  try{ rec = new MediaRecorder(recStream); }
  catch(e){ recStream.getTracks().forEach(t=>t.stop()); tg.showAlert("Yozib bo'lmadi"); return; }
  rec.ondataavailable = e => recChunks.push(e.data);
  rec.start();
  document.getElementById("composer").classList.add("hide");
  document.getElementById("recbar").classList.remove("hide");
  recStart=Date.now(); recBars=[]; tickTime();
  try{
    audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const src = audioCtx.createMediaStreamSource(recStream);
    analyser = audioCtx.createAnalyser(); analyser.fftSize=256; src.connect(analyser);
    drawWave();
  }catch(e){}
}
function tickTime(){
  if(!rec || rec.state!=="recording") return;
  const s=Math.floor((Date.now()-recStart)/1000);
  document.getElementById("rectime").textContent = Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
  setTimeout(tickTime,200);
}
function drawWave(){
  const c=document.getElementById("recwave"); if(!c||!analyser) return;
  const ctx=c.getContext("2d"); const data=new Uint8Array(analyser.frequencyBinCount);
  function frame(){
    if(!analyser) return;
    c.width=c.offsetWidth; c.height=30;
    analyser.getByteFrequencyData(data);
    let sum=0; for(let i=0;i<data.length;i++) sum+=data[i];
    recBars.push(Math.min(1,(sum/data.length/255)*2.4));
    const max=Math.floor(c.width/4); if(recBars.length>max) recBars.shift();
    ctx.clearRect(0,0,c.width,c.height); ctx.fillStyle=getAccent();
    for(let i=0;i<recBars.length;i++){ const h=Math.max(3,recBars[i]*c.height); ctx.fillRect(i*4,(c.height-h)/2,2.4,h); }
    recAnim=requestAnimationFrame(frame);
  }
  frame();
}
function stopSendRec(){ finishRec(true); }
function cancelRec(){ finishRec(false); }
function finishRec(sendIt){
  const doneUI=()=>{ if(recAnim) cancelAnimationFrame(recAnim); recAnim=null;
    if(recStream){ recStream.getTracks().forEach(t=>t.stop()); recStream=null; }
    if(audioCtx){ try{audioCtx.close();}catch(e){} audioCtx=null; } analyser=null;
    document.getElementById("recbar").classList.add("hide");
    document.getElementById("composer").classList.remove("hide"); };
  if(rec && rec.state==="recording"){
    rec.onstop=async()=>{ doneUI();
      if(sendIt){
        const blob=new Blob(recChunks,{type:"audio/ogg"});
        const rd=new FileReader();
        rd.onload=async()=>{ const r=await q("/api/send","POST",Object.assign(auth(),{order_id:CUR,media_kind:"voice",media_data:rd.result}));
          if(!r.ok){ tg.showAlert(r.error||"Yuborilmadi"); return; } await loadMsgs(true); };
        rd.readAsDataURL(blob);
      }
    };
    rec.stop();
  } else { doneUI(); }
}

// ---- Voice pleyer (to'lqin + play/pause, Telegram uslubi) ----
const waveCache={};
const ICON_PLAY='<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
const ICON_PAUSE='<svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>';
function fmtDur(s){ s=Math.max(0,Math.floor(s||0)); return Math.floor(s/60)+":"+String(s%60).padStart(2,"0"); }
function initVoicePlayers(){
  document.querySelectorAll(".vp").forEach(vp=>{
    if(vp.dataset.ready) return; vp.dataset.ready="1";
    const url=vp.dataset.src, fid=vp.dataset.fid;
    const canvas=vp.querySelector("canvas"), btn=vp.querySelector(".pp"), tlab=vp.querySelector(".vt");
    let audio=null, bars=waveCache[fid]||null, dur=0;
    const draw=(prog)=>{ const ctx=canvas.getContext("2d"); canvas.width=canvas.offsetWidth||140; canvas.height=26;
      const b=bars||new Array(32).fill(0.3), bw=canvas.width/b.length;
      for(let i=0;i<b.length;i++){ const h=Math.max(3,b[i]*canvas.height);
        ctx.fillStyle=(i/b.length<=prog)?getAccent():'rgba(140,140,140,.45)';
        ctx.fillRect(i*bw,(canvas.height-h)/2,Math.max(1.5,bw-2),h); } };
    setTimeout(()=>draw(0),0);
    if(!bars){ fetch(url).then(r=>r.arrayBuffer()).then(buf=>{
      const ac=new (window.AudioContext||window.webkitAudioContext)();
      ac.decodeAudioData(buf).then(ab=>{ dur=ab.duration; const ch=ab.getChannelData(0), N=32, block=Math.max(1,Math.floor(ch.length/N)), out=[]; let mx=0;
        for(let i=0;i<N;i++){ let s=0; for(let j=0;j<block;j++) s+=Math.abs(ch[i*block+j]||0); out.push(s/block); mx=Math.max(mx,out[i]); }
        bars=out.map(v=>mx?Math.min(1,v/mx):0.3); waveCache[fid]=bars; draw(0); tlab.textContent=fmtDur(dur); ac.close();
      }).catch(()=>{}); }).catch(()=>{}); }
    const setIcon=p=>btn.innerHTML=p?ICON_PAUSE:ICON_PLAY; setIcon(false);
    btn.onclick=()=>{ if(!audio){ audio=new Audio(url);
        audio.onloadedmetadata=()=>{ if(!dur&&isFinite(audio.duration)){ dur=audio.duration; tlab.textContent=fmtDur(dur);} };
        audio.ontimeupdate=()=>{ const d=audio.duration||dur||1; draw(audio.currentTime/d); tlab.textContent=fmtDur(d-audio.currentTime); };
        audio.onended=()=>{ setIcon(false); draw(0); tlab.textContent=fmtDur(dur); }; }
      if(audio.paused){ audio.play(); setIcon(true); } else { audio.pause(); setIcon(false); } };
    canvas.onclick=e=>{ if(audio&&audio.duration){ audio.currentTime=(e.offsetX/(canvas.offsetWidth||1))*audio.duration; } };
  });
}
