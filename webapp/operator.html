<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Gulnora Farm — Operator</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg: var(--tg-theme-bg-color, #fff);
    --sec: var(--tg-theme-secondary-bg-color, #f1f1f4);
    --text: var(--tg-theme-text-color, #000);
    --hint: var(--tg-theme-hint-color, #999);
    --link: var(--tg-theme-link-color, #2481cc);
    --btn: var(--tg-theme-button-color, #2481cc);
    --btn-text: var(--tg-theme-button-text-color, #fff);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;font-family:-apple-system,Roboto,"Segoe UI",sans-serif;
    background:var(--bg);color:var(--text);font-size:15px}
  .hidden{display:none!important}
  .screen{position:fixed;inset:0;display:flex;flex-direction:column}
  /* Login */
  #login{justify-content:center;align-items:center;padding:24px;gap:14px}
  #login h2{margin:0 0 6px}
  #login input{width:100%;max-width:320px;padding:13px;border:1px solid var(--sec);
    border-radius:10px;background:var(--sec);color:var(--text);font-size:16px}
  #login button,.primary{background:var(--btn);color:var(--btn-text);border:none;
    padding:13px 20px;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;width:100%;max-width:320px}
  .err{color:#e53935;font-size:14px;min-height:18px;text-align:center}
  /* Header */
  .hdr{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--sec);
    border-bottom:1px solid rgba(0,0,0,.06)}
  .hdr .title{font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hdr .sub{font-size:12px;color:var(--hint);font-weight:400}
  .iconbtn{background:none;border:none;color:var(--link);font-size:15px;cursor:pointer;padding:6px}
  /* Chat list */
  #list .rows{flex:1;overflow-y:auto}
  .row{display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid rgba(0,0,0,.05);cursor:pointer;align-items:center}
  .row:active{background:var(--sec)}
  .ava{width:46px;height:46px;border-radius:50%;background:var(--btn);color:var(--btn-text);
    display:flex;align-items:center;justify-content:center;font-weight:600;font-size:18px;flex-shrink:0}
  .row .mid{flex:1;min-width:0}
  .row .nm{font-weight:600;display:flex;justify-content:space-between;gap:8px}
  .row .nm .t{font-size:12px;color:var(--hint);font-weight:400}
  .row .pv{color:var(--hint);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .badge{background:#e53935;color:#fff;font-size:11px;padding:1px 7px;border-radius:10px;margin-left:6px}
  .empty{padding:40px 20px;text-align:center;color:var(--hint)}
  /* Chat view */
  #chat .msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px;background:var(--bg)}
  .bub{max-width:78%;padding:8px 12px;border-radius:14px;font-size:15px;line-height:1.35;word-wrap:break-word;white-space:pre-wrap}
  .bub .tm{font-size:10px;color:var(--hint);margin-top:3px;text-align:right}
  .b-client{align-self:flex-start;background:var(--sec);border-bottom-left-radius:4px}
  .b-op{align-self:flex-end;background:var(--btn);color:var(--btn-text);border-bottom-right-radius:4px}
  .b-op .tm{color:rgba(255,255,255,.7)}
  .composer{display:flex;gap:8px;padding:8px;background:var(--sec);border-top:1px solid rgba(0,0,0,.06)}
  .composer textarea{flex:1;resize:none;border:none;border-radius:18px;padding:9px 14px;font-size:15px;
    background:var(--bg);color:var(--text);max-height:100px}
  .composer .send{width:44px;height:44px;border-radius:50%;background:var(--btn);color:var(--btn-text);
    border:none;font-size:20px;cursor:pointer;flex-shrink:0}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen">
  <h2>👨‍⚕️ Operator paneli</h2>
  <input id="in-login" placeholder="Login" autocomplete="username">
  <input id="in-pass" type="password" placeholder="Parol" autocomplete="current-password">
  <div id="login-err" class="err"></div>
  <button id="btn-login" class="primary">Kirish</button>
</div>

<!-- CHAT LIST -->
<div id="list" class="screen hidden">
  <div class="hdr">
    <div class="title">💬 Chatlar <span id="op-name" class="sub"></span></div>
    <button class="iconbtn" onclick="loadChats()">↻</button>
    <button class="iconbtn" onclick="logout()">Chiqish</button>
  </div>
  <div id="rows" class="rows"></div>
</div>

<!-- CHAT VIEW -->
<div id="chat" class="screen hidden">
  <div class="hdr">
    <button class="iconbtn" onclick="backToList()">‹ Orqaga</button>
    <div class="title" id="chat-name">—<div class="sub" id="chat-phone"></div></div>
    <button class="iconbtn" onclick="closeChat()">✅ Yakunlash</button>
    <button class="iconbtn" onclick="hideChat()">🗑</button>
  </div>
  <div id="msgs" class="msgs"></div>
  <div class="composer">
    <textarea id="in-msg" rows="1" placeholder="Xabar yozing..."></textarea>
    <button class="send" onclick="send()">➤</button>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready(); tg.expand();
const INIT = tg.initData || "";
let OP = { id: localStorage.getItem("op_id"), name: localStorage.getItem("op_name"),
           token: localStorage.getItem("op_token") };
let CUR = null;      // joriy order_id
let pollTimer = null;

function api(path, method, body){
  const b = Object.assign({ _init: INIT }, body || {});
  const opts = { method, headers: { "X-Init-Data": INIT, "Content-Type": "application/json" } };
  if(method === "GET"){
    const p = new URLSearchParams(b);
    return fetch(path + "?" + p.toString(), opts).then(r => r.json());
  }
  opts.body = JSON.stringify(b);
  return fetch(path, opts).then(r => r.json());
}
function show(id){ ["login","list","chat"].forEach(s => document.getElementById(s).classList.toggle("hidden", s !== id)); }
function ini(n){ return (n||"?").trim().charAt(0).toUpperCase(); }
function esc(s){ return (s||"").replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

// ---- Login ----
document.getElementById("btn-login").onclick = async () => {
  const login = document.getElementById("in-login").value.trim();
  const password = document.getElementById("in-pass").value.trim();
  const err = document.getElementById("login-err"); err.textContent = "";
  if(!login || !password){ err.textContent = "Login va parolni kiriting"; return; }
  const r = await api("/api/login", "POST", { login, password });
  if(!r.ok){ err.textContent = r.error || "Xatolik"; return; }
  OP = { id: r.operator_id, name: r.name, token: r.token };
  localStorage.setItem("op_id", OP.id); localStorage.setItem("op_name", OP.name);
  localStorage.setItem("op_token", OP.token);
  enterApp();
};
function logout(){
  localStorage.clear(); OP = {}; CUR = null;
  document.getElementById("in-pass").value = "";
  show("login");
}
function enterApp(){
  document.getElementById("op-name").textContent = "· " + (OP.name || "");
  show("list"); loadChats();
}

// ---- Chat ro'yxati ----
async function loadChats(){
  const r = await api("/api/chats", "GET", { operator_id: OP.id, token: OP.token });
  if(!r.ok){ if(r.error === "auth"){ logout(); } return; }
  const box = document.getElementById("rows");
  if(!r.chats.length){ box.innerHTML = '<div class="empty">Hozircha chat yo\'q</div>'; return; }
  box.innerHTML = r.chats.map(c => `
    <div class="row" onclick="openChat(${c.order_id})">
      <div class="ava">${ini(c.name)}</div>
      <div class="mid">
        <div class="nm"><span>${esc(c.name)} ${c.incoming ? '<span class="badge">yangi</span>' : ''}</span><span class="t">${c.time}</span></div>
        <div class="pv">${esc(c.preview)}</div>
      </div>
    </div>`).join("");
}

// ---- Chat ochish ----
async function openChat(oid){
  CUR = oid;
  show("chat");
  await loadMsgs(true);
  startPoll();
}
async function loadMsgs(scroll){
  const r = await api("/api/messages", "GET", { operator_id: OP.id, token: OP.token, order_id: CUR });
  if(!r.ok){ return; }
  document.getElementById("chat-name").childNodes[0].nodeValue = r.client.name + " ";
  document.getElementById("chat-phone").textContent = r.client.phone || "";
  const box = document.getElementById("msgs");
  box.innerHTML = r.messages.map(m => `
    <div class="bub ${m.sender === 'client' ? 'b-client' : 'b-op'}">${esc(m.text)}<div class="tm">${m.time}</div></div>`).join("");
  if(scroll) box.scrollTop = box.scrollHeight;
}
function startPoll(){
  stopPoll();
  pollTimer = setInterval(() => { if(CUR) loadMsgs(false); }, 4000);
}
function stopPoll(){ if(pollTimer){ clearInterval(pollTimer); pollTimer = null; } }
function backToList(){ stopPoll(); CUR = null; show("list"); loadChats(); }

// ---- Yuborish ----
async function send(){
  const ta = document.getElementById("in-msg");
  const text = ta.value.trim();
  if(!text || !CUR) return;
  ta.value = "";
  const r = await api("/api/send", "POST", { operator_id: OP.id, token: OP.token, order_id: CUR, text });
  if(!r.ok){ tg.showAlert(r.error || "Yuborilmadi"); return; }
  await loadMsgs(true);
}
document.getElementById("in-msg").addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){ e.preventDefault(); send(); }
});

// ---- Yakunlash / o'chirish ----
function closeChat(){
  tg.showConfirm("Murojaatni yakunlaysizmi? Mijozga baholash yuboriladi.", async ok => {
    if(!ok) return;
    await api("/api/close", "POST", { operator_id: OP.id, token: OP.token, order_id: CUR });
    backToList();
  });
}
function hideChat(){
  tg.showConfirm("Chatni ro'yxatdan o'chirasizmi?", async ok => {
    if(!ok) return;
    await api("/api/hide", "POST", { operator_id: OP.id, token: OP.token, order_id: CUR });
    backToList();
  });
}

// ---- Start ----
if(OP.id && OP.token){ enterApp(); } else { show("login"); }
</script>
</body>
</html>
